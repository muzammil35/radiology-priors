experiment:
  name: logreg_case_study_v1
  model_type: logreg


# =========================================================
# MODEL
# =========================================================
model:
  max_iter: 1000
  class_weight: balanced
  solver: lbfgs
  penalty: l2

  # regularization strength (tunable)
  C: 0.03


# =========================================================
# FEATURES
# =========================================================
features:
  # threshold used in engineered binary feature
  score_threshold: 0.5


# =========================================================
# THRESHOLD SELECTION
# =========================================================
threshold:
  strategy: f1   # f1 | recall

  search_range:
    min: 0.1
    max: 0.9
    steps: 50


# =========================================================
# CROSS VALIDATION / SPLIT
# =========================================================
cv:
  test_size: 0.2
  random_state: 42
  group: case_id


# =========================================================
# OPTUNA (optional future use)
# =========================================================
optuna:
  direction: maximize
  n_trials: 30